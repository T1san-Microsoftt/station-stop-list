<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>停車駅一覧</title>

<!-- Zen Maru Gothic フォント読み込み -->
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">

<style>
body {
  background:#111;
  color:white;
  font-family: 'Zen Maru Gothic', sans-serif; /* ←ここを変更 */
  padding:20px;
}

/* タイトル */
h1{
  color:orange;
}

/* 入力セクション */
.controls{
  margin-top:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

select, label{
  font-size:14px;
  padding:4px 6px;
  border-radius:6px;
  border:none;
}

button{
  background:orange;
  border:none;
  padding:6px 12px;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}

.error{
  color:red;
  margin-top:10px;
  font-weight:bold;
}

/* ===== 縦型路線コンテナ ===== */
.route{
  width:260px;
  margin:50px auto;
  position:relative;
}

/* 中央ライン（始点終点は貫通させない） */
.route::before{
  content:"";
  position:absolute;
  left:50%;
  top:80px;
  bottom:80px;
  width:6px;
  background:blue;
  transform:translateX(-50%);
  z-index:0;
}

/* ===== 駅ボックス ===== */
.station{
  position:relative;
  width:220px;
  height:70px;
  margin:15px auto;
  border-radius:14px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:14px;
  z-index:1;
}

.stop{
  background:#1e1e1e;
  border:2px solid #1ec5ff;
  color:white;
}

.pass{
  background:#333;
  border:2px solid #555;
  color:#aaa;
  opacity:0.75;
  transform:scale(0.75);
}

.code{
  font-size:12px;
  opacity:0.8;
}

.jp{
  font-weight:bold;
  font-size:16px;
}

.en{
  font-size:12px;
  opacity:0.9;
}

#bottom-space{
  height:100px; /* 下部余白 */
}
</style>
</head>
<body>

<h1>停車駅一覧 / Station Stop List</h1>

<div class="controls">
  <label>種別:
    <select id="typeSelect">
      <option value="Local">各駅停車</option>
      <option value="Semi">準急</option>
      <option value="Rapid">快速</option>
      <option value="Express">急行</option>
      <option value="Airport">エアポート急行</option>
      <option value="RapidExpress">快速急行</option>
    </select>
  </label>

  <label>夏期:
    <input type="checkbox" id="summerCheck">
  </label>

  <label>始発駅:
    <select id="startSelect"></select>
  </label>

  <label>終着駅:
    <select id="endSelect"></select>
  </label>

  <button id="enterBtn">確定 / Enter</button>
</div>

<div id="errorMsg" class="error"></div>

<div class="route" id="routeDisplay"></div>

<div id="bottom-space"></div>

<script>
const stations = [
  {code:"OB-01", jp:"尾羽原", en:"Obahara", types:["Local","Semi","Rapid","RapidExpress","Express","Airport"]},
  {code:"OB-02", jp:"井口", en:"Iguchi", types:["Local","Semi","Rapid","Express"]},
  {code:"OB-03", jp:"梅郷", en:"Umesato", types:["Local"]},
  {code:"OB-04", jp:"雲中", en:"Kumonaka", types:["Local","Semi","Rapid"]},
  {code:"OB-05", jp:"安越", en:"Yasugoshi", types:["Local","Semi","Rapid","Express","Airport"]},
  {code:"OB-05-1", jp:"十川真砂橋", en:"Togawa-Masagobashi", types:["Local"]},
  {code:"OB-06", jp:"千峰", en:"Senpou", types:["Local","Semi"]},
  {code:"OB-07", jp:"南雲谷", en:"Minami-Kumotani", types:["Local"]},
  {code:"OB-08", jp:"雲谷", en:"Kumotani", types:["Local","Semi","Rapid","Express","RapidExpress"]},
  {code:"OB-09", jp:"長峰", en:"Nagamine", types:["Local","Semi","Rapid"]},
  {code:"OB-09-1", jp:"西高徳", en:"Nishi-Koutoku", types:["Local","Rapid"]},
  {code:"OB-10", jp:"高徳", en:"Koutoku", types:["Local","Semi","Rapid","Express","Airport","RapidExpress"]},
  {code:"OB-11", jp:"明神前", en:"Myojin-mae", types:["Local","Rapid"]},
  {code:"OB-12", jp:"舞子台", en:"Maikodai", types:["Local","Semi","Rapid","Express","RapidExpress","summer"]},
  {code:"OB-13", jp:"紀田", en:"Kida", types:["Local","Semi","Rapid","Express","RapidExpress"]},
  {code:"OB-14", jp:"瀬舞", en:"Semai", types:["Local","Rapid","Express"]},
  {code:"OB-15", jp:"余美", en:"Amarubi", types:["Local","Rapid","Express"]},
  {code:"OB-16", jp:"千鳥", en:"Chidori", types:["Local","Semi","Rapid","Express","RapidExpress"]},
  {code:"OB-17", jp:"問屋町", en:"Toiya-Machi", types:["Local","Semi"]},
  {code:"OB-17-1", jp:"問屋蔵前", en:"Toiya-Kuramae", types:["Local"]},
  {code:"OB-17-2", jp:"赤堀大沢", en:"Akahori-Osawa", types:["Local"]},
  {code:"OB-18", jp:"赤堀", en:"Akahori", types:["Local","Semi"]},
  {code:"OB-19", jp:"新赤堀", en:"Shin-Akahori", types:["Local"]},
  {code:"OB-20", jp:"塚野", en:"Tsukano", types:["Local"]},
  {code:"OB-21", jp:"金田", en:"Kaneda", types:["Local","Semi","Express","RapidExpress"]},
  {code:"OB-22", jp:"百鳥", en:"Hyakutori", types:["Local","Semi","Express","RapidExpress"]},
  {code:"OB-23", jp:"西百鳥", en:"Nishi-Hyakutori", types:["Local","Semi","Rapid"]},
  {code:"OB-24", jp:"支線尾羽", en:"Branch Line Oba", types:["Local","Semi","Express","RapidExpress"]},
  {code:"OB-25", jp:"北尾羽", en:"Kita-Oba", types:["Local","Semi","Express","RapidExpress"]},
];

const startSelect = document.getElementById("startSelect");
const endSelect = document.getElementById("endSelect");
const typeSelect = document.getElementById("typeSelect");
const summerCheck = document.getElementById("summerCheck");
const enterBtn = document.getElementById("enterBtn");
const routeDisplay = document.getElementById("routeDisplay");
const errorMsg = document.getElementById("errorMsg");

const allStartEnd = ["尾羽原","安越","南雲谷","雲谷","高徳","紀田","千鳥","金田","百鳥","北尾羽"];

function updateStartEndOptions(){
  const type = typeSelect.value;
  startSelect.innerHTML="";
  endSelect.innerHTML="";
  allStartEnd.forEach(s=>{
    const st = stations.find(sta=>sta.jp===s);
    if(st && st.types.includes(type)){
      const opt1 = document.createElement("option");
      opt1.value = st.jp;
      opt1.textContent = st.jp;
      startSelect.appendChild(opt1);
      const opt2 = document.createElement("option");
      opt2.value = st.jp;
      opt2.textContent = st.jp;
      endSelect.appendChild(opt2);
    }
  });
  
  // 終着制限
  if(type==="Rapid") endSelect.querySelectorAll("option").forEach(o=>{
    if(stations.find(sta=>sta.jp===o.value).code>"OB-16") o.disabled=true;
  });
  if(type==="Airport") endSelect.querySelectorAll("option").forEach(o=>{
    if(stations.find(sta=>sta.jp===o.value).code>"OB-10") o.disabled=true;
  });
}

typeSelect.addEventListener("change", updateStartEndOptions);
summerCheck.addEventListener("change",()=>{routeDisplay.innerHTML="";errorMsg.textContent="";});
updateStartEndOptions();

enterBtn.addEventListener("click",()=>{
  errorMsg.textContent="";
  routeDisplay.innerHTML="";
  const type = typeSelect.value;
  const start = startSelect.value;
  const end = endSelect.value;
  if(!start || !end){
    errorMsg.textContent="設定が間違っています。やり直してください / Invalid selection";
    return;
  }
  const startIndex = stations.findIndex(s=>s.jp===start);
  const endIndex = stations.findIndex(s=>s.jp===end);
  if(startIndex>endIndex){
    errorMsg.textContent="設定が間違っています。やり直してください / Invalid selection";
    return;
  }
  
  const summer = summerCheck.checked;
  const subStations = stations.slice(startIndex,endIndex+1);
  
  subStations.forEach(s=>{
    let isStop = s.types.includes(type);
    if(s.jp==="舞子台" && summer && type==="Express") isStop=true;
    const div = document.createElement("div");
    div.className="station "+(isStop?"stop":"pass");
    div.innerHTML=`<div class="code">${s.code}</div><div class="jp">${s.jp}</div><div class="en">${s.en}</div>`;
    routeDisplay.appendChild(div);
  });
});
</script>

</body>
</html>
